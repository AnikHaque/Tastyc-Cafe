{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RoyalDine | Fine Dining{% endblock %}</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">

  <style>
    /* --- Dark Mode Variables --- */
    :root { --bg-dark: #121212; --card-dark: #1e1e2f; --text-light: #f8f9fa; --transition: 0.3s ease; }

    /* Dark Mode Global Styles */
    body.dark-mode { background-color: var(--bg-dark) !important; color: var(--text-light) !important; transition: var(--transition); }
    
    body.dark-mode .navbar, 
    body.dark-mode .card, 
    body.dark-mode .bg-white, 
    body.dark-mode .bg-light,
    body.dark-mode section, 
    body.dark-mode .modal-content,
    body.dark-mode .content-wrapper { 
        background-color: var(--bg-dark) !important; 
        color: var(--text-light) !important; 
        border-color: #333 !important;
    }

    /* Text Color Fixes */
    body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4, 
    body.dark-mode h5, body.dark-mode h6, body.dark-mode p, body.dark-mode span, 
    body.dark-mode td, body.dark-mode th, body.dark-mode label, body.dark-mode .nav-link { 
        color: var(--text-light) !important; 
    }

    body.dark-mode .text-muted { color: #aaaaaa !important; }
    body.dark-mode .text-dark { color: #ffffff !important; }
    
    /* Inputs in Dark Mode */
    body.dark-mode .form-control, body.dark-mode .form-select { 
        background-color: #2b2b3d; border-color: #444; color: white; 
    }
    
    /* Active Link in Sidebar/Nav */
    body.dark-mode .active { background-color: rgba(255,255,255,0.1) !important; }

    /* Support Widget Adjustment */
    .widget-btn { width: 55px; height: 55px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.4s; position: relative; border: 2px solid rgba(255,255,255,0.2); }
    .call-btn { background: #2ecc71; font-size: 20px; width: 48px; height: 48px; }
    .messenger-btn { background: #0084FF; font-size: 28px; width: 62px; height: 62px; }
    .widget-tooltip { position: absolute; right: 75px; background: rgba(0,0,0,0.8); color: white; padding: 5px 12px; border-radius: 8px; font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.3s; }
    .widget-btn:hover .widget-tooltip { opacity: 1; right: 70px; }
    .online-dot { position: absolute; top: 5px; right: 5px; width: 14px; height: 14px; background: #2ecc71; border: 2px solid white; border-radius: 50%; }
    .messenger-btn::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #0084FF; animation: widget-pulse 2s infinite; opacity: 0; }
    @keyframes widget-pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }

    /* Dark Mode Chatbot Overrides */
    body.dark-mode .bot-msg { background: #2b2b3d !important; color: white !important; }
    body.dark-mode #chat-window { background: #1e1e2f !important; border-color: #C5A059 !important; }
    body.dark-mode #chat-footer { background: #1e1e2f !important; border-top-color: #333 !important; }
    body.dark-mode .chat-input-wrap { background: #2b2b3d !important; }
    body.dark-mode #user-input { color: white !important; }
  </style>
</head>

<body>
  {% include 'includes/navbar.html' %}

  <div class="content-wrapper">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // --- Scroll Effect ---
    window.addEventListener('scroll', function() {
      const nav = document.querySelector('.navbar');
      if (window.scrollY > 50) { nav.classList.add('nav-scrolled'); } 
      else { nav.classList.remove('nav-scrolled'); }
    });

    // --- Dark Mode Logic ---
    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById('darkModeToggle');
      const body = document.body;
      
      const currentTheme = localStorage.getItem('theme') || 'light';
      
      if (currentTheme === 'dark') {
        body.classList.add('dark-mode');
        if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-sun" style="color: #ffca28;"></i>';
      }

      if (toggleBtn) {
        toggleBtn.addEventListener('click', (e) => {
          e.preventDefault();
          body.classList.toggle('dark-mode');
          
          let theme = 'light';
          if (body.classList.contains('dark-mode')) {
            theme = 'dark';
            toggleBtn.innerHTML = '<i class="fas fa-sun" style="color: #ffca28;"></i>';
          } else {
            toggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
          }
          localStorage.setItem('theme', theme);
        });
      }
    });
  </script>

  <div class="restaurant-support-wrapper" style="position: fixed; bottom: 100px; right: 25px; z-index: 999; display: flex; flex-direction: column; align-items: flex-end; gap: 12px;">
    {% if widget_data %}
        {% if widget_data.show_call %}
        <a href="tel:{{ widget_data.phone }}" class="widget-btn call-btn shadow" title="Call Us Now">
            <i class="fas fa-phone-alt"></i><span class="widget-tooltip">Call Now</span>
        </a>
        {% endif %}

        <a href="{{ widget_data.messenger_link }}" target="_blank" class="widget-btn messenger-btn shadow-lg" title="Chat on Messenger">
            <i class="fab fa-facebook-messenger"></i><span class="widget-tooltip">Messenger</span><span class="online-dot"></span>
        </a>
    {% endif %} 
  </div> 

</body>
</html>
