{% extends 'base.html' %}
{% block content %}

<section class="py-5 mt-5">
    <div class="container">
        <div class="section-title text-center mb-5">
            <h2 class="playfair">Our Visual <span>Experience</span></h2>
            <p class="text-muted">A glimpse into the soul of RoyalDine</p>
        </div>

        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
            <button class="filter-btn active" data-filter="*">All</button>
            {% for cat in categories %}
            <button class="filter-btn" data-filter=".cat-{{ cat.id }}">{{ cat.name }}</button>
            {% endfor %}
        </div>

        <div class="row g-4 gallery-container">
            {% for item in gallery_items %}
            <div class="col-lg-4 col-md-6 gallery-item cat-{{ item.category.id }}">
                <a href="{{ item.image.url }}" class="glightbox" data-gallery="gallery1">
                    <div class="gallery-card shadow-sm">
                        <img src="{{ item.image.url }}" class="img-fluid rounded-4" alt="{{ item.title }}">
                        <div class="gallery-overlay">
                            <i class="fas fa-search-plus"></i>
                            <h5 class="playfair mt-2">{{ item.title }}</h5>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<style>
    .filter-btn {
        border: 2px solid var(--gold);
        background: transparent;
        color: var(--gold);
        padding: 8px 25px;
        border-radius: 50px;
        font-weight: 600;
        transition: 0.3s;
    }
    .filter-btn.active, .filter-btn:hover {
        background: var(--gold);
        color: white;
    }
    .gallery-card {
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        height: 300px;
    }
    .gallery-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s;
    }
    .gallery-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        opacity: 0;
        transition: 0.4s;
    }
    .gallery-card:hover .gallery-overlay { opacity: 1; }
    .gallery-card:hover img { transform: scale(1.1); }
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ১. Lightbox ইনিশিয়ালাইজ করা
        const lightbox = GLightbox({ selector: '.glightbox' });

        // ২. Isotope ফিল্টারিং ইনিশিয়ালাইজ করা
        var iso = new Isotope('.gallery-container', {
            itemSelector: '.gallery-item',
            layoutMode: 'fitRows'
        });

        // ৩. বাটন ক্লিক লজিক
        var filtersElem = document.querySelectorAll('.filter-btn');
        filtersElem.forEach(function(btn) {
            btn.addEventListener('click', function() {
                filtersElem.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                var filterValue = btn.getAttribute('data-filter');
                iso.arrange({ filter: filterValue });
            });
        });
    });
</script>

{% endblock %}
