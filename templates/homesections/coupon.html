    <div class="d-inline-block bg-white border-2 border-dashed border-dark p-3 rounded-3 px-5"><h3 class="fw-bold text-danger mb-0" style="letter-spacing: 5px;">{{ active_coupon.code }}</h3></div>

</div></div></section>{% endif %}
