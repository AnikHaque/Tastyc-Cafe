<section class="py-5 bg-light"><div class="container py-5"><div class="d-flex justify-content-between align-items-end mb-5"><div><h6 class="text-primary fw-bold text-uppercase mb-2" style="letter-spacing: 2px;">From Our Kitchen</h6><h2 class="playfair display-4 fw-bold mb-0">Our <span class="fst-italic">Stories</span></h2></div><a href="{% url 'blog_list' %}" class="btn-read-all">Read All Posts <i class="fas fa-long-arrow-alt-right ms-2"></i></a></div><div class="row g-4">
    {% for blog in blogs %}<div class="col-lg-3 col-md-6"><div class="blog-card-luxury h-100"><div class="blog-img-box"><img src="{% if blog.thumbnail %}{{ blog.thumbnail.url }}{% endif %}" class="blog-img" alt="{{ blog.title }}"><div class="blog-date-tag">{{ blog.created_at|date:"M d" }}</div></div>
    <div class="blog-info p-4 bg-white"><div class="d-flex align-items-center mb-2"><span class="category-dot"></span><span class="text-muted small fw-bold text-uppercase letter-spacing-1">Culinary</span></div><h5 class="playfair fw-bold"><a href="{% url 'blog_detail' blog.slug %}" class="text-dark text-decoration-none blog-title-link">{{ blog.title|truncatechars:45 }}</a></h5><p class="text-muted small mt-2 mb-0">By RoyalDine Editorial</p></div></div></div>{% endfor %}
</div></div></section>
