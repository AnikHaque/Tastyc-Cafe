<section class="py-5 bg-white overflow-hidden"><div class="container py-5"><div class="section-head text-center mb-5"><h6 class="text-primary fw-bold text-uppercase mb-2" style="letter-spacing: 3px;">Social Proof</h6><h2 class="playfair display-4 fw-bold">Guest <span class="fst-italic">Reviews</span></h2><p class="text-muted">আমাদের অতিথিদের মূল্যবান কিছু মন্তব্য</p></div><div class="swiper testimonialSwiper pb-5 px-3"><div class="swiper-wrapper">
    {% for review in testimonials %}<div class="swiper-slide h-auto"><div class="premium-review-card"><div class="quote-icon"><i class="fas fa-quote-right"></i></div><div class="review-body"><p class="review-text">"{{ review.review_text|truncatechars:150 }}"</p></div><hr class="my-4 opacity-10"><div class="d-flex align-items-center justify-content-center flex-column"><div class="guest-avatar-wrap mb-3"><img src="{% if review.image %}{{ review.image.url }}{% else %}https://ui-avatars.com/api/?name={{ review.name }}&background=f8f9fa&color=333{% endif %}" alt="{{ review.name }}"></div><h6 class="fw-bold mb-1 playfair fs-5">{{ review.name }}</h6><div class="rating-stars mb-2"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div></div></div></div>{% endfor %}
</div><div class="swiper-pagination"></div></div></div></section>
