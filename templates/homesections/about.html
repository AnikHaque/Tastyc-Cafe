<section id="about" class="py-5"><div class="container py-5"><div class="row align-items-center">
    <div class="col-lg-6"><div class="position-relative">
        <img src="{% if about.image %}{{ about.image.url }}{% else %}https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=800{% endif %}" class="img-fluid rounded-5 shadow-lg">
        <div class="position-absolute top-0 start-0 bg-gold p-4 rounded-4 shadow-lg text-white m-n3 d-none d-md-block"><h2 class="fw-bold mb-0">{{ about.experience_years }}+</h2><small>Years Experience</small></div>
    </div></div>
    <div class="col-lg-6 ps-lg-5 mt-5 mt-lg-0">
        <span class="text-warning fw-bold text-uppercase">{{ about.legacy_tag|default:"Our Legacy" }}</span>
        <h2 class="playfair display-4 fw-bold mt-2 mb-4">{{ about.title|safe }}</h2>
        <p class="text-muted lead">{{ about.description }}</p>
        <div class="row mt-5 g-4">
            <div class="col-4 border-end"><h3>{{ about.stat1_count }}</h3><small>Menu Items</small></div>
            <div class="col-4 border-end ps-4"><h3>{{ about.stat2_count }}</h3><small>Top Chefs</small></div>
            <div class="col-4 ps-4"><h3>{{ about.stat3_count }}</h3><small>Awards</small></div>
        </div>
    </div>
</div></div></section>
