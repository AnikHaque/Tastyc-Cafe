<section class="py-5 bg-light"><div class="container">
    <div class="section-title"><h2>Signature <span>Collections</span></h2></div>
    <div class="d-flex flex-wrap justify-content-center gap-3">
        {% for cat in categories %}<a href="{% url 'category_items' cat.id %}" class="btn btn-white shadow-sm rounded-pill px-4 py-2 fw-bold text-dark border">{{ cat.name }} <span class="ms-2 badge bg-gold text-white">{{ cat.item_count }}</span></a>{% endfor %}
    </div>
</div></section>
