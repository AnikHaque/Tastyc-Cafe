<section class="py-5 bg-white"><div class="container py-5"><div class="section-title"><h2>The Royal <span>Thali</span></h2></div><div class="row g-4">
    {% for combo in combos|slice:":2" %}<div class="col-lg-6"><div class="thali-card shadow-lg">
        <img src="{% if combo.image %}{{ combo.image.url }}{% else %}https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=600{% endif %}" class="thali-img">
        <div class="thali-info"><h3 class="playfair fw-bold text-warning">{{ combo.name }}</h3><p class="small opacity-75 my-3">{{ combo.description|truncatechars:80 }}</p>
        <div class="d-flex align-items-center gap-3"><span class="h4 fw-bold mb-0">৳{{ combo.discount_price }}</span><del class="small opacity-50">৳{{ combo.original_price }}</del></div>
        {% if IS_RESTAURANT_OPEN %}<a href="{% url 'add_combo_to_cart' combo.id %}" class="btn btn-warning btn-sm rounded-pill mt-4">Order Now</a>
        {% else %}<button class="btn btn-secondary btn-sm rounded-pill mt-4" disabled title="Orders are disabled right now">Closed Now</button>{% endif %}</div>
    </div></div>{% endfor %}
</div></div></section>
